<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="tan91">
    <link rel="icon" type="image/svg+xml" href="../TeamIco.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="/assets/css/admin-sidebar.css">
    <style>
        :root { --bg-dark: #121212; --bg-panel: #1e1e1e; --border-color: #333; --accent: #ff6b00; --danger: #ef4444; --success: #22c55e; --info: #3b82f6; --text-main: #e0e0e0; --text-dim: #737373; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .btn-danger-ghost { color: #888; border: 1px solid transparent; padding: 0.25rem 0.5rem; font-size: 0.75rem; transition: 0.2s; cursor: pointer; background: transparent; }
        .btn-danger-ghost:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,0.1); }
        .container-id { background: #000; color: var(--info); padding: 2px 6px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
        .btn-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); color: var(--text-dim); border-radius: 2px; transition: 0.2s; cursor: pointer; }
        .btn-icon:hover { border-color: white; color: white; background: rgba(255,255,255,0.1); }
        .tactical-table thead th { background: #151515; color: #666; font-family: 'JetBrains Mono', monospace; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; padding: 1rem; border-bottom: 1px solid #333; text-align: left; font-size: 0.75rem; }
        .tactical-table tbody tr { border-bottom: 1px solid #252525; transition: background 0.2s; }
        .tactical-table tbody tr:hover { background: rgba(255,255,255,0.02); }
        .tactical-table td { padding: 1rem; vertical-align: middle; }
        .status-badge { display: inline-flex; align-items: center; font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; border: 1px solid transparent; }
        .status-running { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .status-expired { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; border-bottom: 2px solid transparent; color: #888; cursor: pointer; transition: all 0.2s; background: transparent; border-top: none; border-left: none; border-right: none; }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #1e1e1e; border: 1px solid #333; padding: 1.5rem; max-width: 400px; width: 90%; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="selection:bg-[#ff6b00] selection:text-black">
    <div class="admin-sidebar-content">
        <main class="flex-1 flex flex-col pt-6 px-8 relative overflow-hidden">

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white font-eng tracking-wide">DOCKER_INSTANCES</h2>
            </div>

            <!-- 组织 Tab 栏 -->
            <div id="org-tabs" class="flex border-b border-[#333] mb-6 overflow-x-auto" style="min-height: 38px;">
                <div class="text-gray-500 text-xs font-mono py-2 px-4">加载中...</div>
            </div>

            <!-- 统计卡片 -->
            <div id="stats-section" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="admin-card p-5">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-xs text-gray-500 font-mono uppercase">运行中容器</span>
                            <span id="stat-running" class="text-xl font-eng font-bold text-green-500">-</span>
                        </div>
                        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
                            <div id="progress-running" class="bg-green-500 h-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="admin-card p-5">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-xs text-gray-500 font-mono uppercase">过期待清理</span>
                            <span id="stat-expired" class="text-xl font-eng font-bold text-red-400">-</span>
                        </div>
                        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
                            <div id="progress-expired" class="bg-red-500 h-full progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="admin-card p-5">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-xs text-gray-500 font-mono uppercase">今日创建</span>
                            <span id="stat-today-created" class="text-xl font-eng font-bold text-blue-400">-</span>
                        </div>
                        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full progress-bar" style="width: 50%"></div>
                        </div>
                    </div>
                    <div class="admin-card p-5">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-xs text-gray-500 font-mono uppercase">今日销毁</span>
                            <span id="stat-today-destroyed" class="text-xl font-eng font-bold text-gray-400">-</span>
                        </div>
                        <div class="w-full bg-[#333] h-1.5 rounded-full overflow-hidden">
                            <div class="bg-gray-500 h-full progress-bar" style="width: 30%"></div>
                        </div>
                    </div>
                </div>

                <!-- 工具栏 -->
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-[#1a1a1a] p-4 border border-[#333]">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <h2 class="text-sm font-bold text-white font-eng tracking-wide">CONTAINER_POOL</h2>
                        <div class="h-6 w-px bg-[#333]"></div>
                        <div class="relative">
                            <input id="search-input" type="text" placeholder="搜索容器ID / 队伍 / 用户..." class="bg-[#111] border border-[#333] text-xs text-white px-4 py-2 w-72 focus:border-[#ff6b00] outline-none font-mono placeholder-gray-600">
                            <button onclick="loadInstances()" class="absolute right-2 top-1.5 text-gray-500 hover:text-white">🔍</button>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <select id="status-filter" onchange="loadInstances()" class="bg-[#111] border border-[#333] text-xs text-gray-400 px-3 py-2 outline-none hover:border-[#555] cursor-pointer">
                            <option value="">全部状态</option>
                            <option value="running">运行中</option>
                        </select>
                        <button onclick="loadInstances()" class="btn-danger-ghost border-blue-900 text-blue-400">刷新</button>
                    </div>
                </div>

                <!-- 实例列表 -->
                <div class="admin-card overflow-hidden flex-1">
                    <div style="max-height: 420px; overflow-y: auto;">
                        <table class="w-full tactical-table">
                            <thead>
                                <tr>
                                    <th>容器名</th>
                                    <th>队伍</th>
                                    <th>比赛</th>
                                    <th>题目</th>
                                    <th>创建者</th>
                                    <th>端口映射</th>
                                    <th>状态</th>
                                    <th>过期时间</th>
                                    <th class="text-right pr-6">操作</th>
                                </tr>
                            </thead>
                            <tbody id="instances-tbody">
                                <tr><td colspan="9" class="text-center text-gray-500 py-8">请选择组织</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden">
                <div class="empty-state">
                    <div style="font-size: 64px; opacity: 0.2; margin-bottom: 16px;">🐳</div>
                    <div style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">暂无 Docker 管理权限</div>
                    <div style="font-size: 13px; color: #888;">您尚未被分配任何组织的 Docker 管理权限，请联系超级管理员。</div>
                </div>
            </div>

            <footer class="py-1 border-t border-[#333] flex items-center justify-center flex-shrink-0 mt-auto">
                <div class="flex items-center justify-center gap-4 text-xs flex-wrap">
                    <div class="flex items-center gap-1">
                        <div class="bg-[#ff6b00] text-black font-black px-1.5 py-0.5 font-eng tracking-tighter">TG</div>
                        <span class="text-gray-500">天格后台管理系统</span>
                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>
                </div>
            </footer>
        </main>
    </div>

    <!-- 确认弹窗 -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="confirm-title" class="text-white font-bold mb-4">确认操作</h3>
            <p id="confirm-message" class="text-gray-400 text-sm mb-6"></p>
            <div class="flex justify-end gap-3">
                <button onclick="closeConfirmModal()" class="px-4 py-2 text-sm text-gray-400 hover:text-white border border-gray-600 hover:border-white">取消</button>
                <button id="confirm-btn" class="px-4 py-2 text-sm bg-red-600 text-white hover:bg-red-700">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/admin-common';
        function getToken() { return localStorage.getItem('tg_token'); }

        let allOrgs = [];
        let currentOrgId = null;
        let currentPerms = [];

        function showTip(msg, type = 'info') {
            const colors = { success: '#22c55e', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
            const tip = document.createElement('div');
            tip.textContent = msg;
            tip.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${colors[type]||colors.info};color:#fff;padding:12px 20px;border-radius:4px;z-index:9999;font-size:14px;`;
            document.body.appendChild(tip);
            setTimeout(() => tip.remove(), 3000);
        }

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

        async function init() {
            try {
                const res = await fetch(`${API}/my-organizations`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const orgs = data.organizations || [];

                // 过滤有 docker.view 权限的组织
                allOrgs = orgs.filter(o => (o.permissions || []).includes('docker.view'));

                if (allOrgs.length === 0) {
                    document.getElementById('org-tabs').innerHTML = '';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                renderTabs();
                document.getElementById('stats-section').classList.remove('hidden');
                selectOrg(allOrgs[0].id);
            } catch (e) {
                console.error(e);
                document.getElementById('org-tabs').innerHTML = '<div class="text-red-500 text-xs font-mono py-2 px-4">加载失败</div>';
            }
        }

        function renderTabs() {
            const container = document.getElementById('org-tabs');
            container.innerHTML = allOrgs.map(o =>
                `<button class="tab-btn font-mono" data-org-id="${o.id}" onclick="selectOrg(${o.id})">${escapeHtml(o.name)}</button>`
            ).join('');
        }

        function selectOrg(orgId) {
            currentOrgId = orgId;
            document.querySelectorAll('#org-tabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.orgId) === orgId);
            });
            const org = allOrgs.find(o => o.id === orgId);
            currentPerms = org ? (org.permissions || []) : [];
            loadStats();
            loadInstances();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/organizations/${currentOrgId}/docker/stats`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                const data = await res.json();
                document.getElementById('stat-running').textContent = data.runningCount || 0;
                document.getElementById('stat-expired').textContent = data.expiredCount || 0;
                document.getElementById('stat-today-created').textContent = data.todayCreated || 0;
                document.getElementById('stat-today-destroyed').textContent = data.todayDestroyed || 0;
                const runPct = Math.min((data.runningCount || 0) / 100 * 100, 100);
                document.getElementById('progress-running').style.width = runPct + '%';
                const expPct = data.runningCount > 0 ? (data.expiredCount || 0) / data.runningCount * 100 : 0;
                document.getElementById('progress-expired').style.width = expPct + '%';
            } catch (e) { console.error('加载统计失败', e); }
        }

        async function loadInstances() {
            const tbody = document.getElementById('instances-tbody');
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-500 py-8">加载中...</td></tr>';

            const search = document.getElementById('search-input').value;
            const statusFilter = document.getElementById('status-filter').value;
            const params = new URLSearchParams();
            if (search) params.append('search', search);
            if (statusFilter) params.append('status', statusFilter);

            try {
                const res = await fetch(`${API}/organizations/${currentOrgId}/docker/instances?${params.toString()}`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                const data = await res.json();
                const instances = data.instances || [];
                const canDelete = currentPerms.includes('docker.delete');

                if (instances.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-500 py-8">暂无容器实例</td></tr>';
                    return;
                }

                tbody.innerHTML = instances.map(inst => {
                    const ports = Object.entries(inst.ports || {}).map(([k, v]) => `${v}:${k}`).join(', ') || '-';
                    const statusClass = inst.isExpired ? 'status-expired' : 'status-running';
                    const statusText = inst.isExpired ? '⚠ 已过期' : '● 运行中';
                    const destroyBtn = canDelete ? `<div title="强制销毁" class="btn-icon text-red-500 hover:bg-red-900 border-red-900 hover:border-red-500" onclick="destroyInstance(${inst.id}, '${escapeHtml(inst.containerName || '')}')">✕</div>` : '';

                    return `<tr class="${inst.isExpired ? 'bg-red-900 bg-opacity-5' : ''}">
                        <td><div class="flex flex-col"><span class="container-id w-fit ${inst.isExpired ? 'bg-red-900 text-red-300' : ''}">${escapeHtml(inst.containerName || inst.containerId)}</span></div></td>
                        <td><div class="text-sm font-bold text-white">${escapeHtml(inst.teamName)}</div></td>
                        <td class="text-xs text-gray-400">${escapeHtml(inst.contestName)}</td>
                        <td class="text-xs text-gray-300">${escapeHtml(inst.challengeName)}</td>
                        <td class="text-xs text-gray-400 font-mono">${escapeHtml(inst.userName)}</td>
                        <td class="text-xs text-blue-400 font-mono">${ports}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="text-xs text-gray-500 font-mono">${inst.expiresAt || '-'}</td>
                        <td class="text-right pr-4"><div class="flex justify-end gap-2">${destroyBtn}</div></td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error('加载实例失败', e);
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-red-500 py-8">加载失败</td></tr>';
            }
        }

        let confirmCallback = null;
        function showConfirm(title, message, callback) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); confirmCallback = null; }
        document.getElementById('confirm-btn').onclick = () => { if (confirmCallback) confirmCallback(); closeConfirmModal(); };

        async function destroyInstance(id, name) {
            showConfirm('确认销毁', `确定要销毁容器 "${name}" 吗？此操作不可恢复。`, async () => {
                try {
                    const res = await fetch(`${API}/organizations/${currentOrgId}/docker/instances/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + getToken() }
                    });
                    const data = await res.json();
                    if (res.ok) { showTip(data.message || '销毁成功', 'success'); loadStats(); loadInstances(); }
                    else showTip(data.error || '销毁失败', 'error');
                } catch (e) { showTip('销毁失败', 'error'); }
            });
        }

        document.getElementById('search-input').addEventListener('keyup', e => { if (e.key === 'Enter') loadInstances(); });
        document.getElementById('logout-btn')?.addEventListener('click', () => { localStorage.removeItem('tg_token'); localStorage.removeItem('tg_user'); window.location.href = '/login.html'; });

        init();

        // 自动刷新（30秒）
        setInterval(() => { if (currentOrgId) { loadStats(); loadInstances(); } }, 30000);
    </script>
<script src="/assets/js/admin-sidebar.js"></script>
</body>
</html>
