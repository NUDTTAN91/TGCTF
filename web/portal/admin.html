    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --border-color: #333;
            --accent: #ff6b00; /* 战术橙 */
            --danger: #ef4444; /* 警告红 */
            --text-main: #e0e0e0;
            --text-dim: #737373;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        /* 战术面板卡片 */
        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; transition: all 0.3s ease; }
        .admin-card:hover { transform: translateY(-2px); border-color: #555; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .admin-card::after { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 20px solid var(--border-color); border-left: 20px solid transparent; }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="selection:bg-[#ff6b00] selection:text-black">

            <div class="relative z-10 w-full max-w-[1920px] mx-auto flex-1 flex flex-col">
                
                <!-- 核心数据卡片 (5项) -->

                            <span class="text-[#ff6b00] opacity-50 group-hover:opacity-100 transition-opacity">⚑</span>
                        </div>
                        <div class="text-5xl font-eng font-bold text-white" id="stat-contests">--</div>
                    </div>

                    <!-- 指标 2: 用户数 -->

                            <div class="text-xs text-gray-500 font-mono uppercase tracking-widest">用户数</div>
                            <span class="text-[#ff6b00] opacity-50 group-hover:opacity-100 transition-opacity">웃</span>
                        </div>
                        <div class="text-5xl font-eng font-bold text-white" id="stat-users">--</div>
                    </div>

                    <!-- 指标 3: 队伍数 -->
                    <div class="admin-card p-6 group flex flex-col justify-between h-32">
                        <div class="flex justify-between items-start">
                            <div class="text-xs text-gray-500 font-mono uppercase tracking-widest">队伍数</div>
                            <span class="text-[#ff6b00] opacity-50 group-hover:opacity-100 transition-opacity">◈</span>
                        </div>
                        <div class="text-5xl font-eng font-bold text-white" id="stat-teams">--</div>
                    </div>

                    <!-- 指标 4: 总题目数 -->

                            <div class="text-xs text-gray-500 font-mono uppercase tracking-widest">总题目数</div>
                            <span class="text-[#ff6b00] opacity-50 group-hover:opacity-100 transition-opacity">☷</span>
                        </div>
                        <div class="text-5xl font-eng font-bold text-white" id="stat-challenges">--</div>
                    </div>

                    <!-- 指标 5: Docker启动数量 -->

                    </div>

                    <div class="text-9xl font-black text-[#333] font-eng">TG CORE</div>
                    <div class="text-sm font-mono text-[#555] tracking-[0.5em] mt-6">SYSTEM MONITORING ACTIVE</div>
                </div>

            </div>

                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>

                </div>

        </main>

    <script>
        // 解析 JWT Token 获取用户信息
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // 登录检查：未登录则跳转到登录页
        const token = localStorage.getItem('tg_token');
        let userRole = null;
        let userPermissions = [];
        if (!token) {
            window.location.href = '/login.html';
        } else {
            // 检查是否为管理员（super 或 admin）
            const payload = parseJwt(token);
            if (!payload || (payload.role !== 'super' && payload.role !== 'admin')) {
                // 非管理员跳转登录
                window.location.href = '/login.html';
            }
            userRole = payload.role;
            
            // 超级管理员不应该进入 portal，跳转到 admin
            if (userRole === 'super') {
                window.location.href = '/admin/admin.html';
            }
            
            // 更新左下角用户信息
            document.querySelector('.p-4.border-t p.text-xs')?.textContent = '普通管理员';
        }

        // 退出登录
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            localStorage.removeItem('tg_token');
            window.location.href = '/login.html';
        });

        // 加载概览数据
        async function loadOverviewStats() {
            // 普通管理员概览页留空
            if (userRole === 'admin') {
                document.querySelector('.grid.grid-cols-1').innerHTML = '';
                return;
            }

            try {
                const res = await fetch('/api/admin/overview', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-contests').textContent = data.contests.toLocaleString();
                    document.getElementById('stat-users').textContent = data.users.toLocaleString();
                    document.getElementById('stat-teams').textContent = data.teams.toLocaleString();
                    document.getElementById('stat-challenges').textContent = data.challenges.toLocaleString();
                    document.getElementById('stat-docker').textContent = data.docker.toLocaleString();
                }
            } catch (e) {
                console.error('加载概览数据失败:', e);
            }
        }

        // 加载普通管理员的权限列表
        async function loadMyPermissions() {
            try {
                const res = await fetch('/api/admin-common/my-permissions', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    const permDiv = document.getElementById('my-permissions');
                    if (!data.permissions || data.permissions.length === 0) {
                        permDiv.innerHTML = '暂无权限，请联系超级管理员';
                        permDiv.className = 'mt-2 text-xs text-gray-500';
                    } else {
                        // 构建可点击的权限卡片
                        let html = '<div class="flex flex-wrap gap-3 justify-center mt-4">';
                        const monitorContests = new Set();
                        
                        data.permissions.forEach(p => {
                            // 新格式：contest.{id}.monitor
                            const monitorMatch = p.permission.match(/^contest\.(\d+)\.monitor$/);
                            if (monitorMatch) {
                                monitorContests.add(monitorMatch[1]);
                            }
                            // 兼容旧格式：contest.monitor.view + resourceIds
                            if (p.permission === 'contest.monitor.view' && p.resourceIds) {
                                const contestIds = p.resourceIds.split(',');
                                contestIds.forEach(cid => monitorContests.add(cid.trim()));
                            }
                        });
                        
                        monitorContests.forEach(cid => {
                            html += `
                                <a href="/contest-monitor.html?id=${cid}" 
                                   class="inline-flex items-center gap-2 px-4 py-2 bg-[#1a1a1a] border border-[#333] hover:border-[#ff6b00] hover:bg-[#222] transition-all rounded cursor-pointer">
                                    <span class="text-lg">📊</span>
                                    <span class="text-white">比赛 #${cid} 数据大屏</span>
                                </a>`;
                        });
                        
                        html += '</div>';
                        permDiv.innerHTML = monitorContests.size > 0 ? html : '暂无权限';
                    }
                }
            } catch (e) {
                console.error('加载权限失败:', e);
            }
        }

        loadOverviewStats();
    </script>

<script src="/assets/js/admin-sidebar.js"></script>
