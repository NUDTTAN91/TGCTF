<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="tan91">
    <link rel="icon" type="image/svg+xml" href="../TeamIco.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="/assets/css/admin-sidebar.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --border-color: #333;
            --accent: #ff6b00;
            --danger: #ef4444;
            --success: #22c55e;
            --info: #3b82f6;
            --text-main: #e0e0e0;
            --text-dim: #737373;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; }

        .btn-action { border: 1px solid var(--border-color); color: var(--text-dim); padding: 0.25rem 0.5rem; font-size: 0.75rem; transition: all 0.2s; white-space: nowrap; cursor: pointer; background: transparent; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.05); }
        .btn-danger-ghost { color: #888; border: 1px solid transparent; padding: 0.25rem 0.5rem; font-size: 0.75rem; transition: 0.2s; margin-left: 0.5rem; cursor: pointer; background: transparent; }
        .btn-danger-ghost:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,0.1); }

        .tactical-table thead th { background: #151515; color: #666; font-family: 'JetBrains Mono', monospace; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; padding: 1rem; border-bottom: 1px solid #333; text-align: left; font-size: 0.75rem; }
        .tactical-table tbody tr { border-bottom: 1px solid #252525; transition: background 0.2s; }
        .tactical-table tbody tr:hover { background: rgba(255,255,255,0.02); }
        .tactical-table td { padding: 1rem; vertical-align: middle; }

        .avatar-frame { width: 36px; height: 36px; background: #111; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #666; position: relative; font-family: 'Chakra Petch', sans-serif; }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-green { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
        .dot-gray { background: #555; }

        .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; border-bottom: 2px solid transparent; color: #888; cursor: pointer; transition: all 0.2s; background: transparent; border-top: none; border-left: none; border-right: none; }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="selection:bg-[#ff6b00] selection:text-black">
    <div class="admin-sidebar-content">
        <main class="flex-1 flex flex-col pt-6 px-8 relative overflow-hidden">

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white font-eng tracking-wide">USER_MANAGEMENT</h2>
            </div>

            <!-- 组织 Tab 栏 -->
            <div id="org-tabs" class="flex border-b border-[#333] mb-6 overflow-x-auto" style="min-height: 38px;">
                <div class="text-gray-500 text-xs font-mono py-2 px-4">加载中...</div>
            </div>

            <!-- 搜索栏 -->
            <div id="search-bar" class="hidden mb-4">
                <div class="relative" style="max-width: 320px;">
                    <input type="text" id="search-input" placeholder="搜索用户名 / 昵称 / ID..." class="bg-[#111] border border-[#333] text-xs text-white px-4 py-2 w-full focus:border-[#ff6b00] outline-none font-mono placeholder-gray-600">
                </div>
            </div>

            <!-- 用户表格 -->
            <div id="user-table-wrap" class="admin-card overflow-hidden flex-1 flex flex-col min-h-0 hidden">
                <div class="flex-1 overflow-y-auto">
                    <table class="w-full tactical-table">
                        <thead id="users-thead">
                            <tr>
                                <th class="w-16 text-left pl-6">ID</th>
                                <th>用户</th>
                                <th>昵称</th>
                                <th>邮箱</th>
                                <th>所属队伍</th>
                                <th>状态</th>
                                <th class="text-left">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr><td colspan="7" class="text-center py-12 text-gray-500 font-mono">请选择组织</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="p-4 border-t border-[#333] flex justify-between items-center bg-[#151515]">
                    <div id="pagination-info" class="text-xs text-gray-500 font-mono">显示 0 条记录</div>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden">
                <div class="empty-state">
                    <div style="font-size: 64px; opacity: 0.2; margin-bottom: 16px;">웃</div>
                    <div style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">暂无用户管理权限</div>
                    <div style="font-size: 13px; color: #888;">您尚未被分配任何组织的用户管理权限，请联系超级管理员。</div>
                </div>
            </div>

            <footer class="py-1 border-t border-[#333] flex items-center justify-center flex-shrink-0 mt-auto">
                <div class="flex items-center justify-center gap-4 text-xs flex-wrap">
                    <div class="flex items-center gap-1">
                        <div class="bg-[#ff6b00] text-black font-black px-1.5 py-0.5 font-eng tracking-tighter">TG</div>
                        <span class="text-gray-500">天格后台管理系统</span>
                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>
                </div>
            </footer>

        </main>
    </div>

    <!-- 编辑用户模态框 -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden items-center justify-center">
        <div class="bg-[#1e1e1e] border border-[#444] w-full max-w-md mx-4">
            <div class="p-4 border-b border-[#333] flex justify-between items-center">
                <h3 class="font-bold text-white">编辑用户</h3>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-mono">显示名称</label>
                    <input type="text" id="edit-displayName" class="w-full bg-[#111] border border-[#333] text-white px-3 py-2 text-sm focus:border-[#ff6b00] outline-none" placeholder="显示名称">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-mono">邮箱</label>
                    <input type="email" id="edit-email" class="w-full bg-[#111] border border-[#333] text-white px-3 py-2 text-sm focus:border-[#ff6b00] outline-none font-mono" placeholder="email@example.com">
                </div>
            </div>
            <div class="p-4 border-t border-[#333] flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-4 py-2 text-xs text-gray-400 border border-[#333] hover:border-gray-500 font-mono">取消</button>
                <button onclick="submitEdit()" class="px-4 py-2 text-xs bg-[#ff6b00] text-black font-bold hover:bg-[#ff8533] font-mono">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/admin-common';
        function getToken() { return localStorage.getItem('tg_token'); }

        let allOrgs = [];         // 有 user.view 权限的组织
        let currentOrgId = null;
        let currentPerms = [];    // 当前组织的权限
        let currentUsers = [];
        let editingUserId = null;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // 获取URL参数中指定的orgId
        function getUrlOrgId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('org') ? parseInt(params.get('org')) : null;
        }

        async function init() {
            try {
                const res = await fetch(`${API}/my-organizations`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const orgs = data.organizations || [];

                // 过滤出有 user.view 权限的组织
                allOrgs = orgs.filter(o => (o.permissions || []).includes('user.view'));

                if (allOrgs.length === 0) {
                    document.getElementById('org-tabs').innerHTML = '';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                renderTabs();
                document.getElementById('search-bar').classList.remove('hidden');
                document.getElementById('user-table-wrap').classList.remove('hidden');

                // 自动选中 URL 指定的组织或第一个
                const urlOrgId = getUrlOrgId();
                const targetOrg = urlOrgId ? allOrgs.find(o => o.id === urlOrgId) : null;
                selectOrg(targetOrg ? targetOrg.id : allOrgs[0].id);
            } catch (e) {
                console.error(e);
                document.getElementById('org-tabs').innerHTML = '<div class="text-red-500 text-xs font-mono py-2 px-4">加载失败</div>';
            }
        }

        function renderTabs() {
            const container = document.getElementById('org-tabs');
            container.innerHTML = allOrgs.map(o =>
                `<button class="tab-btn font-mono" data-org-id="${o.id}" onclick="selectOrg(${o.id})">${escapeHtml(o.name)}</button>`
            ).join('');
        }

        function selectOrg(orgId) {
            currentOrgId = orgId;
            // 更新 tab 样式
            document.querySelectorAll('#org-tabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.orgId) === orgId);
            });
            // 获取当前组织的权限
            const org = allOrgs.find(o => o.id === orgId);
            currentPerms = org ? (org.permissions || []) : [];
            loadUsers(orgId);
        }

        async function loadUsers(orgId) {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-gray-500 font-mono">加载中...</td></tr>';

            try {
                const res = await fetch(`${API}/organizations/${orgId}/users`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                currentUsers = data.users || [];
                // 合并 API 返回的权限（可能比组织级别更精确）
                if (data.permissions) currentPerms = data.permissions;

                updateTableHeader();
                renderUsers();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-red-500 font-mono">加载失败</td></tr>';
            }
        }

        function updateTableHeader() {
            const hasActions = currentPerms.includes('user.edit') || currentPerms.includes('user.ban');
            const thead = document.getElementById('users-thead');
            thead.innerHTML = `<tr>
                <th class="w-16 text-left pl-6">ID</th>
                <th>用户名</th>
                <th>昵称</th>
                <th>邮箱</th>
                <th>所属队伍</th>
                <th>状态</th>
                ${hasActions ? '<th class="text-left">操作</th>' : ''}
            </tr>`;
        }

        function renderUsers() {
            const tbody = document.getElementById('users-tbody');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const hasEdit = currentPerms.includes('user.edit');
            const hasBan = currentPerms.includes('user.ban');
            const hasActions = hasEdit || hasBan;
            const colSpan = hasActions ? 7 : 6;

            let filtered = currentUsers.filter(u => {
                if (!searchTerm) return true;
                return (u.username || '').toLowerCase().includes(searchTerm)
                    || (u.displayName || '').toLowerCase().includes(searchTerm)
                    || String(u.id).includes(searchTerm);
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${colSpan}" class="text-center py-12 text-gray-500 font-mono">暂无用户数据</td></tr>`;
                document.getElementById('pagination-info').textContent = '显示 0 条记录';
                return;
            }

            tbody.innerHTML = filtered.map(u => renderUserRow(u, hasEdit, hasBan, hasActions)).join('');
            document.getElementById('pagination-info').textContent = `显示 ${filtered.length} 条记录`;
        }

        function renderUserRow(u, hasEdit, hasBan, hasActions) {
            const isBanned = u.status === 'banned';
            const nameClass = isBanned ? 'text-gray-400 line-through' : 'text-white';
            const statusDot = isBanned ? 'dot-red' : 'dot-green';
            const statusText = isBanned ? '已停用' : '已激活';
            const statusColor = isBanned ? 'text-red-500' : 'text-green-500';

            let actionsHtml = '';
            if (hasActions) {
                let btns = '';
                if (hasEdit && !isBanned) {
                    btns += `<button onclick="openEditModal(${u.id})" class="btn-action">编辑</button>`;
                }
                if (hasBan) {
                    if (isBanned) {
                        btns += `<button onclick="toggleUserStatus(${u.id}, 'active')" class="btn-action text-green-400 border-green-800 hover:border-green-500 hover:text-green-500">启用</button>`;
                    } else {
                        btns += `<button onclick="toggleUserStatus(${u.id}, 'banned')" class="btn-danger-ghost">禁用</button>`;
                    }
                }
                actionsHtml = `<td class="text-left">${btns}</td>`;
            }

            return `
            <tr class="${isBanned ? 'bg-red-900 bg-opacity-5' : ''}">
                <td class="pl-6"><span class="font-mono text-gray-500 text-xs">${u.id}</span></td>
                <td class="text-sm font-mono text-gray-300">@${escapeHtml(u.username)}</td>
                <td class="text-sm ${nameClass}">${escapeHtml(u.displayName)}</td>
                <td class="text-xs text-gray-400 font-mono">${escapeHtml(u.email) || '-'}</td>
                <td class="text-xs text-gray-400">${escapeHtml(u.teamName) || '-'}</td>
                <td><div class="flex items-center text-xs ${statusColor}"><span class="status-dot ${statusDot}"></span>${statusText}</div></td>
                ${actionsHtml}
            </tr>`;
        }

        // 编辑用户
        function openEditModal(userId) {
            editingUserId = userId;
            const u = currentUsers.find(x => x.id === userId);
            if (!u) return;
            document.getElementById('edit-displayName').value = u.displayName || '';
            document.getElementById('edit-email').value = u.email || '';
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('flex');
            editingUserId = null;
        }

        async function submitEdit() {
            const displayName = document.getElementById('edit-displayName').value.trim();
            const email = document.getElementById('edit-email').value.trim();
            if (!displayName) { alert('请填写显示名称'); return; }

            try {
                const res = await fetch(`${API}/organizations/${currentOrgId}/users/${editingUserId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName, email })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(err.message || '保存失败');
                    return;
                }
                closeEditModal();
                loadUsers(currentOrgId);
            } catch (e) {
                console.error(e);
                alert('保存失败');
            }
        }

        // 禁用/启用用户
        async function toggleUserStatus(userId, status) {
            const action = status === 'banned' ? '禁用' : '启用';
            if (!confirm(`确定要${action}该用户吗？`)) return;
            try {
                const res = await fetch(`${API}/organizations/${currentOrgId}/users/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(err.message || `${action}失败`);
                    return;
                }
                loadUsers(currentOrgId);
            } catch (e) {
                console.error(e);
                alert(`${action}失败`);
            }
        }

        // 搜索
        document.getElementById('search-input').addEventListener('input', renderUsers);

        // 模态框点击背景关闭
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        // 登出
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            localStorage.removeItem('tg_token');
            localStorage.removeItem('tg_user');
            window.location.href = '/login.html';
        });

        // 初始化
        init();
    </script>

<script src="/assets/js/admin-sidebar.js"></script>
</body>
</html>
