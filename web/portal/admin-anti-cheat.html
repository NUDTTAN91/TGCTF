<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="tan91">
    <link rel="icon" type="image/svg+xml" href="../TeamIco.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="/assets/css/admin-sidebar.css">
    <style>
        :root { --bg-dark: #121212; --bg-panel: #1e1e1e; --border-color: #333; --accent: #ff6b00; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; --text-main: #e0e0e0; --text-dim: #737373; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
        .tag-high { background: #450a0a; color: #f87171; border: 1px solid #ef444455; }
        .tag-medium { background: #422006; color: #fbbf24; border: 1px solid #f59e0b55; }
        .tag-low { background: #14532d; color: #4ade80; border: 1px solid #22c55e55; }
        .ip-badge { background: #222; border: 1px solid #333; padding: 2px 6px; font-size: 0.7rem; color: #86efac; }
        .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; border-bottom: 2px solid transparent; color: #888; cursor: pointer; transition: all 0.2s; background: transparent; border-top: none; border-left: none; border-right: none; }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .filter-btn { padding: 0.35rem 0.75rem; border: 1px solid #333; background: transparent; color: #888; font-size: 0.75rem; transition: all 0.2s; cursor: pointer; }
        .filter-btn:hover { color: white; border-color: #555; }
        .filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255,107,0,0.1); }
        .risk-card { border-left: 3px solid transparent; transition: all 0.2s; }
        .risk-card.high { border-left-color: #ef4444; }
        .risk-card.medium { border-left-color: #f59e0b; }
        .risk-card.low { border-left-color: #22c55e; }
        .detail-panel { background: #151515; border-top: 1px solid #222; display: none; }
        .detail-panel.open { display: block; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="selection:bg-[#ff6b00] selection:text-black">
    <div class="admin-sidebar-content">
        <main class="flex-1 flex flex-col pt-6 px-8 relative overflow-hidden">

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white font-eng tracking-wide">ANTI_CHEAT_SYSTEM</h2>
            </div>

            <!-- 组织 Tab 栏 -->
            <div id="org-tabs" class="flex border-b border-[#333] mb-6 overflow-x-auto" style="min-height: 38px;">
                <div class="text-gray-500 text-xs font-mono py-2 px-4">加载中...</div>
            </div>

            <!-- 内容区 -->
            <div id="content-section" class="hidden flex-1 flex flex-col min-h-0">
                <div class="admin-card flex flex-col flex-1">
                    <!-- 风险等级过滤 -->
                    <div class="p-4 border-b border-[#333] bg-[#1a1a1a] flex justify-between items-center flex-shrink-0">
                        <div class="flex gap-2">
                            <button onclick="filterRisk('')" class="filter-btn active" data-risk="">全部</button>
                            <button onclick="filterRisk('high')" class="filter-btn" data-risk="high">🔴 高风险</button>
                            <button onclick="filterRisk('medium')" class="filter-btn" data-risk="medium">🟡 中风险</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <span id="record-count" class="text-xs text-gray-500 font-mono">0 条记录</span>
                            <button onclick="loadAntiCheat()" class="filter-btn">刷新</button>
                        </div>
                    </div>

                    <!-- 可疑记录列表 -->
                    <div id="suspicious-list" class="flex-1 overflow-y-auto bg-[#1e1e1e] p-4 space-y-3">
                        <div class="text-gray-500 text-center py-8 font-mono text-sm">请选择组织</div>
                    </div>

                    <div class="p-3 border-t border-[#333] flex justify-between items-center bg-[#1a1a1a] text-xs font-mono text-gray-500 flex-shrink-0">
                        <span>🛡️ 防作弊系统 - 只读查看</span>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden">
                <div class="empty-state">
                    <div style="font-size: 64px; opacity: 0.2; margin-bottom: 16px;">🛡️</div>
                    <div style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">暂无防作弊查看权限</div>
                    <div style="font-size: 13px; color: #888;">您尚未被分配任何组织的防作弊查看权限，请联系超级管理员。</div>
                </div>
            </div>

            <footer class="py-1 border-t border-[#333] flex items-center justify-center flex-shrink-0 mt-auto">
                <div class="flex items-center justify-center gap-4 text-xs flex-wrap">
                    <div class="flex items-center gap-1">
                        <div class="bg-[#ff6b00] text-black font-black px-1.5 py-0.5 font-eng tracking-tighter">TG</div>
                        <span class="text-gray-500">天格后台管理系统</span>
                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>
                </div>
            </footer>
        </main>
    </div>

    <script>
        const API = '/api/admin-common';
        function getToken() { return localStorage.getItem('tg_token'); }

        let allOrgs = [];
        let currentOrgId = null;
        let suspiciousData = [];
        let currentRiskFilter = '';

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

        function formatTime(str) {
            if (!str) return '-';
            const d = new Date(str);
            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        async function init() {
            try {
                const res = await fetch(`${API}/my-organizations`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const orgs = data.organizations || [];

                // 过滤有 anti_cheat.view 权限的组织
                allOrgs = orgs.filter(o => (o.permissions || []).includes('anti_cheat.view'));

                if (allOrgs.length === 0) {
                    document.getElementById('org-tabs').innerHTML = '';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                renderTabs();
                document.getElementById('content-section').classList.remove('hidden');
                selectOrg(allOrgs[0].id);
            } catch (e) {
                console.error(e);
                document.getElementById('org-tabs').innerHTML = '<div class="text-red-500 text-xs font-mono py-2 px-4">加载失败</div>';
            }
        }

        function renderTabs() {
            const container = document.getElementById('org-tabs');
            container.innerHTML = allOrgs.map(o =>
                `<button class="tab-btn font-mono" data-org-id="${o.id}" onclick="selectOrg(${o.id})">${escapeHtml(o.name)}</button>`
            ).join('');
        }

        function selectOrg(orgId) {
            currentOrgId = orgId;
            document.querySelectorAll('#org-tabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.orgId) === orgId);
            });
            loadAntiCheat();
        }

        async function loadAntiCheat() {
            const container = document.getElementById('suspicious-list');
            container.innerHTML = '<div class="text-gray-500 text-center py-8 font-mono text-sm">加载中...</div>';

            try {
                const res = await fetch(`${API}/organizations/${currentOrgId}/anti-cheat`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                if (!res.ok) throw new Error('加载失败');
                suspiciousData = await res.json();
                if (!Array.isArray(suspiciousData)) suspiciousData = suspiciousData.records || [];
                document.getElementById('record-count').textContent = suspiciousData.length + ' 条记录';
                renderSuspicious();
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="text-red-500 text-center py-8 font-mono text-sm">加载失败</div>';
            }
        }

        function renderSuspicious() {
            const container = document.getElementById('suspicious-list');
            let filtered = suspiciousData;
            if (currentRiskFilter) filtered = suspiciousData.filter(r => r.riskLevel === currentRiskFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center py-8 font-mono text-sm">暂无可疑记录</div>';
                return;
            }

            container.innerHTML = filtered.map((record, idx) => {
                const tagClass = record.riskLevel === 'high' ? 'tag-high' : record.riskLevel === 'medium' ? 'tag-medium' : 'tag-low';
                const riskText = record.riskLevel === 'high' ? '高风险' : record.riskLevel === 'medium' ? '中风险' : '低风险';
                const typeIcon = record.type === 'same_ip_diff_team' ? '🌐' : record.type === 'same_wrong_flag' ? '🚩' : record.type === 'same_team_multi_ip' ? '📍' : record.type === 'login_ip_change' ? '🔑' : '⚠️';

                return `
                <div class="admin-card risk-card ${record.riskLevel}" style="background: #1a1a1a;">
                    <div class="p-4 cursor-pointer flex justify-between items-start" onclick="toggleDetails(${idx})">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-lg">${typeIcon}</span>
                                <span class="tag ${tagClass}">${riskText}</span>
                                <span class="text-xs text-gray-500 font-mono">${escapeHtml(record.contestName || '')}</span>
                                ${record.challengeName ? `<span class="text-xs text-gray-500 font-mono">· ${escapeHtml(record.challengeName)}</span>` : ''}
                            </div>
                            <p class="text-sm text-gray-300">${escapeHtml(record.description)}</p>
                        </div>
                        <span class="text-gray-500 text-sm" id="arrow-${idx}">▼</span>
                    </div>
                    <div id="details-${idx}" class="detail-panel p-4">
                        ${renderDetails(record)}
                    </div>
                </div>`;
            }).join('');
        }

        function renderDetails(record) {
            if (!record.details || record.details.length === 0) return '<p class="text-gray-500 text-sm font-mono">无详细数据</p>';
            return `<div class="space-y-2">${record.details.map(d => `
                <div class="bg-[#111] border-l-2 border-[#ff6b00] p-3 flex justify-between items-center text-sm">
                    <div class="flex items-center gap-4">
                        <span class="text-gray-300 font-mono">${escapeHtml(d.teamName || '-')}</span>
                        ${d.userName ? `<span class="text-gray-500 text-xs">by ${escapeHtml(d.userName)}</span>` : ''}
                        ${d.ipAddress ? `<span class="ip-badge">${escapeHtml(d.ipAddress)}</span>` : ''}
                    </div>
                    <div class="flex items-center gap-3">
                        ${d.isCorrect !== undefined ? `<span class="${d.isCorrect ? 'text-green-500' : 'text-red-500'} text-xs">${d.isCorrect ? '✓ 正确' : '✗ 错误'}</span>` : ''}
                        <span class="text-gray-500 text-xs font-mono">${formatTime(d.submittedAt)}</span>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function toggleDetails(idx) {
            const el = document.getElementById('details-' + idx);
            const arrow = document.getElementById('arrow-' + idx);
            el.classList.toggle('open');
            arrow.textContent = el.classList.contains('open') ? '▲' : '▼';
        }

        function filterRisk(level) {
            currentRiskFilter = level;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.risk === level));
            renderSuspicious();
        }

        document.getElementById('logout-btn')?.addEventListener('click', () => { localStorage.removeItem('tg_token'); localStorage.removeItem('tg_user'); window.location.href = '/login.html'; });

        init();
    </script>

<script src="/assets/js/admin-sidebar.js"></script>
</body>
</html>
