<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="tan91">
    <link rel="icon" type="image/svg+xml" href="../TeamIco.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --border-color: #333;
            --accent: #ff6b00;
            --danger: #ef4444;
            --success: #22c55e;
            --info: #3b82f6;
            --text-main: #e0e0e0;
            --text-dim: #737373;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .sidebar-item { border-left: 2px solid transparent; transition: all 0.2s; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255, 107, 0, 0.05); border-left-color: var(--accent); color: white; }
        .sidebar-item.active .icon { color: var(--accent); }

        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; }

        .org-card { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 1.5rem; transition: all 0.2s; }
        .org-card:hover { border-color: #555; }
        .org-logo { width: 48px; height: 48px; background: #111; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-family: 'Chakra Petch', sans-serif; font-size: 1.4rem; flex-shrink: 0; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-green { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot-red { background: var(--danger); box-shadow: 0 0 5px var(--danger); }

        .btn-action { border: 1px solid var(--border-color); color: var(--text-dim); padding: 0.4rem 0.75rem; font-size: 0.75rem; transition: all 0.2s; white-space: nowrap; cursor: pointer; background: transparent; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.05); }

        .stat-badge { display: inline-flex; align-items: center; gap: 4px; padding: 0.2rem 0.5rem; background: #111; border: 1px solid #333; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }

        .perm-tag { font-size: 0.6rem; padding: 0.1rem 0.4rem; background: rgba(255,107,0,0.1); color: var(--accent); border: 1px solid rgba(255,107,0,0.2); margin-right: 0.25rem; margin-bottom: 0.25rem; display: inline-block; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="flex h-screen overflow-hidden selection:bg-[#ff6b00] selection:text-black">

    <!-- 左侧侧边栏 -->
    <aside class="w-48 bg-[#161616] border-r border-[#333] flex flex-col z-20 shadow-xl">
        <div class="h-16 flex items-center px-6 border-b border-[#333]">
            <div class="bg-[#ff6b00] text-black font-black text-xl px-2 py-0.5 font-eng tracking-tighter mr-3">TG</div>
            <span class="font-bold text-gray-300 tracking-wider text-sm">管理中枢</span>
        </div>
        <nav class="flex-1 py-6 space-y-1 font-mono text-xs overflow-y-auto">
            <a href="/portal/admin.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">⌂</span> 概览</a>
            <p class="px-6 text-[#555] mb-2 font-bold mt-4">赛事核心</p>
            <a href="/portal/admin-contests.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">⚑</span> 比赛管理</a>
            <a href="/portal/admin-question-bank.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">☷</span> 题库</a>
            <a href="/portal/admin-users.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">웃</span> 用户管理</a>
            <a href="/portal/admin-teams.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">◈</span> 队伍管理</a>
            <a href="/portal/admin-organizations.html" class="sidebar-item active flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">🏢</span> 组织管理</a>
            <a href="/portal/admin-data-import.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">📥</span> 数据导入</a>
            <a href="/portal/admin-admins.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400 super-only"><span class="icon mr-3">👤</span> 管理员管理</a>
            <p class="px-6 text-[#555] mb-2 font-bold mt-6">运维监控</p>
            <a href="/portal/admin-docker.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">🐳</span> docker实例管理</a>
            <a href="/portal/admin-anti-cheat.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">🛡️</span> 防作弊系统</a>
            <a href="/portal/admin-logs.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">⚠</span> 系统日志</a>
            <a href="/portal/admin-settings.html" class="sidebar-item flex items-center px-6 py-3 text-gray-400"><span class="icon mr-3">⚙</span> 系统设置</a>
        </nav>
        <div class="p-4 border-t border-[#333]">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#333] rounded-full flex items-center justify-center text-[#ff6b00] font-bold">A</div>
                <div><p class="text-xs text-white font-bold">管理员</p><p class="text-[10px] text-green-500">● 在线</p></div>
            </div>
        </div>
    </aside>

    <!-- 右侧内容区 -->
    <div class="flex-1 flex flex-col min-w-0 bg-[#121212]">
        <header class="h-16 bg-[#161616] border-b border-[#333] flex items-center justify-between px-8 z-10">
            <div class="flex items-center gap-4 text-xs font-mono">
                <span class="text-gray-500">位置:</span><span class="text-[#ff6b00]">赛事核心</span><span class="text-gray-600">/</span><span class="text-white">组织管理</span>
            </div>
            <div class="flex items-center gap-3">
                <a href="/home.html" class="font-mono text-xs font-bold border border-gray-500 text-gray-400 px-4 py-2 hover:border-white hover:text-white transition-all uppercase tracking-wider">← 返回前台</a>
                <button id="logout-btn" class="font-mono text-xs font-bold border border-[#ff6b00] text-[#ff6b00] px-4 py-2 hover:bg-[#ff6b00] hover:text-black transition-all uppercase tracking-wider">Logout_离线</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col pt-8 px-8 relative overflow-y-auto">

            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold text-white font-eng tracking-wide">MY_ORGANIZATIONS</h2>
                <div class="text-xs text-gray-500 font-mono" id="org-count"></div>
            </div>

            <div id="org-list" class="space-y-4 pb-8">
                <div class="empty-state">
                    <div style="font-size: 48px; opacity: 0.2; margin-bottom: 16px;">⏳</div>
                    <div class="text-gray-500 font-mono text-sm">加载中...</div>
                </div>
            </div>

            <footer class="py-1 border-t border-[#333] flex items-center justify-center flex-shrink-0 mt-auto">
                <div class="flex items-center justify-center gap-4 text-xs flex-wrap">
                    <div class="flex items-center gap-1">
                        <div class="bg-[#ff6b00] text-black font-black px-1.5 py-0.5 font-eng tracking-tighter">TG</div>
                        <span class="text-gray-500">天格后台管理系统</span>
                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>
                </div>
            </footer>

        </main>
    </div>

    <script>
        const API = '/api/admin-common';
        function getToken() { return localStorage.getItem('tg_token'); }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        async function loadOrganizations() {
            const container = document.getElementById('org-list');
            try {
                const res = await fetch(`${API}/my-organizations`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const orgs = data.organizations || [];

                if (orgs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size: 64px; opacity: 0.2; margin-bottom: 16px;">🏢</div>
                            <div style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">暂无组织权限</div>
                            <div style="font-size: 13px; color: #888;">您尚未被分配任何组织的管理权限，请联系超级管理员。</div>
                        </div>`;
                    document.getElementById('org-count').textContent = '';
                    return;
                }

                document.getElementById('org-count').textContent = `共 ${orgs.length} 个组织`;
                container.innerHTML = orgs.map(o => renderOrgCard(o)).join('');
            } catch (e) {
                console.error(e);
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; opacity: 0.3; margin-bottom: 16px;">⚠</div>
                        <div class="text-red-500 font-mono text-sm">加载失败，请刷新页面重试</div>
                    </div>`;
            }
        }

        function renderOrgCard(o) {
            const perms = o.permissions || [];
            const isDisabled = o.status === 'disabled';
            const statusDot = isDisabled ? 'dot-red' : 'dot-green';
            const statusText = isDisabled ? '已禁用' : '活跃';
            const statusColor = isDisabled ? 'text-red-500' : 'text-green-500';
            const logoColor = isDisabled ? 'border-red-500 text-red-500' : 'border-gray-600 text-gray-400';

            const hasUserView = perms.includes('user.view');
            const hasTeamView = perms.includes('team.view');

            const userBtn = hasUserView
                ? `<a href="admin-users.html?org=${o.id}" class="btn-action font-mono">웃 查看成员</a>`
                : '';
            const teamBtn = hasTeamView
                ? `<a href="admin-teams.html?org=${o.id}" class="btn-action font-mono">◈ 查看队伍</a>`
                : '';

            const permTags = perms.map(p => `<span class="perm-tag">${escapeHtml(p)}</span>`).join('');

            return `
            <div class="org-card">
                <div class="flex items-start gap-4">
                    <div class="org-logo ${logoColor}">${(o.name || '?').charAt(0).toUpperCase()}</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-white font-bold text-base">${escapeHtml(o.name)}</span>
                            <span class="text-xs ${statusColor}"><span class="status-dot ${statusDot}"></span>${statusText}</span>
                        </div>
                        <div class="text-gray-500 text-xs mb-3">${escapeHtml(o.description) || '暂无简介'}</div>
                        <div class="flex items-center gap-3 mb-3">
                            <span class="stat-badge"><span class="text-blue-400">웃</span> ${o.userCount || 0} 用户</span>
                            <span class="stat-badge"><span class="text-purple-400">◈</span> ${o.teamCount || 0} 队伍</span>
                        </div>
                        <div class="flex flex-wrap mb-2">${permTags}</div>
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                        ${userBtn}
                        ${teamBtn}
                    </div>
                </div>
            </div>`;
        }

        // 初始化
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('tg_token');
            localStorage.removeItem('tg_user');
            window.location.href = '/login.html';
        });

        loadOrganizations();
    </script>
</body>
</html>
