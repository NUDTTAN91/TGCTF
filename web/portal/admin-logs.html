<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="tan91">
    <link rel="icon" type="image/svg+xml" href="../TeamIco.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="/assets/css/admin-sidebar.css">
    <style>
        :root { --bg-dark: #121212; --bg-panel: #1e1e1e; --border-color: #333; --accent: #ff6b00; --danger: #ef4444; --success: #22c55e; --text-main: #e0e0e0; --text-dim: #737373; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans SC', sans-serif; }
        .font-eng { font-family: 'Chakra Petch', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .admin-card { background: var(--bg-panel); border: 1px solid var(--border-color); position: relative; }
        .log-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .log-table th { background: #151515; border-bottom: 1px solid #333; padding: 0.75rem 1rem; text-align: left; color: #666; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; white-space: nowrap; }
        .log-table td { border-bottom: 1px solid #2a2a2a; padding: 0.6rem 1rem; vertical-align: middle; }
        .log-table tr:hover td { background: rgba(255,255,255,0.02); }
        .log-table .col-time { width: 170px; white-space: nowrap; }
        .log-table .col-ip { width: 140px; white-space: nowrap; }
        .log-table .col-user { width: 110px; color: #ff6b00; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .log-table .col-msg { color: #ddd; }
        .log-table .col-status { width: 90px; text-align: center; white-space: nowrap; }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
        .tag-time { background: #1a2332; color: #60a5fa; border: 1px solid #2563eb33; }
        .tag-ip { background: #1f2420; color: #86efac; border: 1px solid #22c55e33; }
        .tag-success { background: #14532d; color: #4ade80; border: 1px solid #22c55e55; }
        .tag-failed { background: #450a0a; color: #f87171; border: 1px solid #ef444455; }
        .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; border-bottom: 2px solid transparent; color: #888; cursor: pointer; transition: all 0.2s; background: transparent; border-top: none; border-left: none; border-right: none; }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
    <script src="js/portal-auth.js"></script>
</head>
<body class="selection:bg-[#ff6b00] selection:text-black">
    <div class="admin-sidebar-content">
        <main class="flex-1 flex flex-col pt-6 px-8 relative overflow-hidden">

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white font-eng tracking-wide">SYSTEM_LOGS</h2>
            </div>

            <!-- 组织 Tab 栏 -->
            <div id="org-tabs" class="flex border-b border-[#333] mb-6 overflow-x-auto" style="min-height: 38px;">
                <div class="text-gray-500 text-xs font-mono py-2 px-4">加载中...</div>
            </div>

            <!-- 内容区 -->
            <div id="content-section" class="hidden flex-1 flex flex-col min-h-0">
                <div class="admin-card flex flex-col flex-1">
                    <!-- 工具栏 -->
                    <div class="p-4 border-b border-[#333] bg-[#1a1a1a] flex justify-between items-center flex-shrink-0">
                        <h2 class="text-sm font-bold text-white tracking-wider">SYSTEM_LOGS_STREAM</h2>
                        <div class="flex gap-2">
                            <select id="type-filter" class="bg-[#111] border border-[#333] text-xs px-3 py-1.5 text-white outline-none font-mono">
                                <option value="">全部类型</option>
                                <option value="login">登录</option>
                                <option value="challenge_view">题目查看</option>
                                <option value="flag_submit">Flag提交</option>
                                <option value="container_create">容器创建</option>
                                <option value="container_destroy">容器销毁</option>
                                <option value="container_extend">容器续期</option>
                                <option value="cheating">作弊检测</option>
                            </select>
                            <select id="level-filter" class="bg-[#111] border border-[#333] text-xs px-3 py-1.5 text-white outline-none font-mono">
                                <option value="">全部级别</option>
                                <option value="success">成功</option>
                                <option value="error">错误</option>
                                <option value="warning">警告</option>
                                <option value="info">信息</option>
                            </select>
                            <input id="search-input" type="text" placeholder="搜索日志..." class="bg-[#111] border border-[#333] text-xs px-3 py-1.5 text-white outline-none w-48 font-mono">
                            <button onclick="loadLogs()" class="bg-[#333] border border-[#333] text-xs text-gray-300 px-4 py-1.5 hover:text-white cursor-pointer">刷新</button>
                        </div>
                    </div>

                    <!-- 日志表格 -->
                    <div class="flex-1 overflow-y-auto bg-[#1e1e1e]">
                        <table class="log-table">
                            <thead class="sticky top-0 z-10"><tr><th>时间</th><th>IP</th><th>用户</th><th>信息</th><th>状态</th></tr></thead>
                            <tbody id="logs-tbody"><tr><td colspan="5" class="text-center text-gray-500 py-8">请选择组织</td></tr></tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div class="p-3 border-t border-[#333] flex justify-between items-center bg-[#1a1a1a] text-xs font-mono text-gray-500 flex-shrink-0">
                        <span id="total-info">共 0 条记录</span>
                        <div class="flex items-center gap-4">
                            <button onclick="prevPage()" class="hover:text-white cursor-pointer">&lt; 上一页</button>
                            <span id="page-info">PAGE 1 / 1</span>
                            <button onclick="nextPage()" class="hover:text-white cursor-pointer">下一页 &gt;</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden">
                <div class="empty-state">
                    <div style="font-size: 64px; opacity: 0.2; margin-bottom: 16px;">⚠</div>
                    <div style="font-size: 18px; font-weight: bold; color: white; margin-bottom: 8px;">暂无日志查看权限</div>
                    <div style="font-size: 13px; color: #888;">您尚未被分配任何组织的日志查看权限，请联系超级管理员。</div>
                </div>
            </div>

            <footer class="py-1 border-t border-[#333] flex items-center justify-center flex-shrink-0 mt-auto">
                <div class="flex items-center justify-center gap-4 text-xs flex-wrap">
                    <div class="flex items-center gap-1">
                        <div class="bg-[#ff6b00] text-black font-black px-1.5 py-0.5 font-eng tracking-tighter">TG</div>
                        <span class="text-gray-500">天格后台管理系统</span>
                    </div>
                    <span class="text-white font-mono">Copyright © 2021-present tan91. All Rights Reserved.</span>
                </div>
            </footer>
        </main>
    </div>

    <script>
        const API = '/api/admin-common';
        function getToken() { return localStorage.getItem('tg_token'); }

        let allOrgs = [];
        let currentOrgId = null;
        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 50;

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

        async function init() {
            try {
                const res = await fetch(`${API}/my-organizations`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const orgs = data.organizations || [];

                // 过滤有 logs.view 权限的组织
                allOrgs = orgs.filter(o => (o.permissions || []).includes('logs.view'));

                if (allOrgs.length === 0) {
                    document.getElementById('org-tabs').innerHTML = '';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                renderTabs();
                document.getElementById('content-section').classList.remove('hidden');
                selectOrg(allOrgs[0].id);
            } catch (e) {
                console.error(e);
                document.getElementById('org-tabs').innerHTML = '<div class="text-red-500 text-xs font-mono py-2 px-4">加载失败</div>';
            }
        }

        function renderTabs() {
            const container = document.getElementById('org-tabs');
            container.innerHTML = allOrgs.map(o =>
                `<button class="tab-btn font-mono" data-org-id="${o.id}" onclick="selectOrg(${o.id})">${escapeHtml(o.name)}</button>`
            ).join('');
        }

        function selectOrg(orgId) {
            currentOrgId = orgId;
            currentPage = 1;
            document.querySelectorAll('#org-tabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.orgId) === orgId);
            });
            loadLogs();
        }

        async function loadLogs() {
            const type = document.getElementById('type-filter').value;
            const level = document.getElementById('level-filter').value;
            const search = document.getElementById('search-input').value;

            let url = `${API}/organizations/${currentOrgId}/logs?page=${currentPage}&pageSize=${pageSize}`;
            if (type) url += `&type=${type}`;
            if (level) url += `&level=${level}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;

            try {
                const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + getToken() } });
                const data = await res.json();

                totalPages = data.totalPages || 1;
                document.getElementById('total-info').textContent = `共 ${data.total || 0} 条记录`;
                document.getElementById('page-info').textContent = `PAGE ${currentPage} / ${totalPages}`;

                const tbody = document.getElementById('logs-tbody');
                if (!data.logs || data.logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray-500 py-8">暂无日志记录</td></tr>';
                    return;
                }

                tbody.innerHTML = data.logs.map(log => {
                    const time = log.createdAt || '-';
                    const isSuccess = log.level === 'success' || log.level === 'info';
                    const statusTag = isSuccess ? 'tag-success' : 'tag-failed';
                    const statusText = isSuccess ? 'SUCCESS' : 'FAILED';

                    return `<tr>
                        <td class="col-time"><span class="tag tag-time">${escapeHtml(time)}</span></td>
                        <td class="col-ip"><span class="tag tag-ip">${escapeHtml(log.ipAddress || '-')}</span></td>
                        <td class="col-user">${escapeHtml(log.userName || '-')}</td>
                        <td class="col-msg">${escapeHtml(log.message)}</td>
                        <td class="col-status"><span class="tag ${statusTag}">${statusText}</span></td>
                    </tr>`;
                }).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('logs-tbody').innerHTML = '<tr><td colspan="5" class="text-center text-red-500 py-8">加载失败</td></tr>';
            }
        }

        function prevPage() { if (currentPage > 1) { currentPage--; loadLogs(); } }
        function nextPage() { if (currentPage < totalPages) { currentPage++; loadLogs(); } }

        // 筛选器事件
        document.getElementById('type-filter').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('level-filter').addEventListener('change', () => { currentPage = 1; loadLogs(); });
        document.getElementById('search-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') { currentPage = 1; loadLogs(); } });

        document.getElementById('logout-btn')?.addEventListener('click', () => { localStorage.removeItem('tg_token'); localStorage.removeItem('tg_user'); window.location.href = '/login.html'; });

        init();
    </script>
<script src="/assets/js/admin-sidebar.js"></script>
</body>
</html>
